name: no_time_to_hack
description: Adaptive AI-Driven Honeypot Firewall — Mobile & Desktop Control App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── HTTP / API ──────────────────────────────────────────────
  dio: ^5.4.3
  dio_smart_retry: ^6.0.0

  # ── Auth / Storage ──────────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── State Management ────────────────────────────────────────
  provider: ^6.1.2
  go_router: ^13.2.4

  # ── WebSocket ───────────────────────────────────────────────
  web_socket_channel: ^2.4.5

  # ── Charts ──────────────────────────────────────────────────
  fl_chart: ^0.67.0

  # ── Map ─────────────────────────────────────────────────────
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # ── Utility ─────────────────────────────────────────────────
  intl: ^0.19.0
  timeago: ^3.6.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
