# ──────────────────────────────────────────────────────────────────────────────
# NTTH Gateway — dnsmasq DHCP + DNS configuration
# Serves IPs to devices connected to the NTTH-Secure hotspot
# ──────────────────────────────────────────────────────────────────────────────

# Listen on the bridge (covers both Wi-Fi clients and VMs)
interface=br-ntth
bind-interfaces

# ── DHCP ──────────────────────────────────────────────────────────────────
dhcp-range=192.168.4.2,192.168.4.200,255.255.255.0,24h
dhcp-option=option:router,192.168.4.1
dhcp-option=option:dns-server,192.168.4.1

# ── DNS ───────────────────────────────────────────────────────────────────
# Upstream DNS servers
server=8.8.8.8
server=1.1.1.1

# Log DNS queries for NTTH visibility
log-queries
log-facility=/var/log/ntth-dnsmasq.log

# ── Performance ───────────────────────────────────────────────────────────
cache-size=1000
