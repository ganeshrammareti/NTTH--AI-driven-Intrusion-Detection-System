# ──────────────────────────────────────────────────────────────────────────────
# NTTH Gateway — hostapd configuration
# Protected Access Point for monitored devices
# ──────────────────────────────────────────────────────────────────────────────

interface=wlx24ec99bfe292
bridge=br-ntth
driver=nl80211

# ── Network ────────────────────────────────────────────────────────────────
ssid=NTTH-Secure
hw_mode=g
channel=7
country_code=IN

# ── Security ──────────────────────────────────────────────────────────────
wpa=2
wpa_passphrase=NoTimeToHack2026
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# ── Client isolation — prevents L2 attacks between connected devices ─────
ap_isolate=1

# ── Performance ───────────────────────────────────────────────────────────
wmm_enabled=1
ieee80211n=1
